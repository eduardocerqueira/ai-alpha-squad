# Non-secret squad defaults. Copy to squad-config.yaml (gitignored) or set in GitHub Variables.
# Secrets stay in .env / GitHub Secrets — see infrastructure-prerequisites.md

# AI runtime — override with env SQUAD_AI_PROVIDER (copilot | huggingface)
ai:
  provider: copilot
  defaults:
    huggingface: meta-llama/Meta-Llama-3.1-8B-Instruct
  agents:
    business-owner:
      huggingface: deepseek-ai/DeepSeek-V4-Flash
    architect:
      huggingface: Qwen/Qwen3.6-27B
    developer:
      huggingface: Qwen/Qwen2.5-Coder-32B-Instruct
    qa:
      huggingface: deepseek-ai/DeepSeek-V4-Flash
    security:
      huggingface: deepseek-ai/DeepSeek-V4-Flash
    devops:
      huggingface: Qwen/Qwen2.5-Coder-32B-Instruct
    tech-writer:
      huggingface: meta-llama/Meta-Llama-3.3-70B-Instruct
    release-manager:
      huggingface: deepseek-ai/DeepSeek-V4-Flash

github:
  owner: eduardocerqueira
  work_queue_repo: ai-alpha-squad
  issues_url: https://github.com/eduardocerqueira/ai-alpha-squad/issues

director:
  github_handle: eduardocerqueira
  # whatsapp_phone: set in .env as WHATSAPP_DIRECTOR_PHONE

cloudflare:
  account_id: ""  # fill when using Workers
  default_compatibility_date: "2025-01-01"

release:
  changelog_path: CHANGELOG.md
  default_release_branch: main

# Target repos for example jobs (issues still opened on work_queue_repo)
example_targets:
  vscode_extension:
    delivery: marketplace_and_open_vsx
  modernize:
    - eduardocerqueira/seeker
    - eduardocerqueira/cloudbitsgo
  ios_game:
    delivery: apple_app_store
