<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Director — AI Alpha Squad</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/director/dashboard.css">
</head>
<body class="director-page">
  <main class="director-shell">
    <header class="director-top">
      <h1>Director</h1>
      <p class="director-lead" id="lead">Loading…</p>
    </header>

    <p class="director-error hidden" id="error"></p>

    <section class="director-section" id="section-move" hidden>
      <h2>Your move</h2>
      <ul class="director-list" id="list-move"></ul>
    </section>

    <section class="director-section" id="section-attention" hidden>
      <h2>Attention</h2>
      <p class="section-note">Squad should be advancing these — if idle for hours, the pipeline is stuck.</p>
      <ul class="director-list" id="list-attention"></ul>
    </section>

    <p class="director-hint">
      Terminal: <code>./scripts/squad-director-now.sh</code>
    </p>
  </main>

  <script src="/director/dashboard.js" defer></script>
</body>
</html>
