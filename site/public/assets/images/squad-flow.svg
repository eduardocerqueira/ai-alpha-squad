<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 530" role="img" aria-labelledby="flowTitle flowDesc">
  <title id="flowTitle">AI Alpha Squad delivery flow</title>
  <desc id="flowDesc">Director submits work via GitHub Issues, API, or WhatsApp. Agents analyze, design, implement, validate, and release to the target repository.</desc>
  <defs>
    <marker id="flow-arrow" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L6,3.5 L0,7 Z" fill="#9ca3af"/>
    </marker>
    <marker id="flow-arrow-sdlc" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L6,3.5 L0,7 Z" fill="#22c55e"/>
    </marker>
    <marker id="flow-arrow-intake" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L6,3.5 L0,7 Z" fill="#888"/>
    </marker>
    <linearGradient id="flow-boxGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
  </defs>

  <rect width="1060" height="530" fill="#141414" stroke="#2a2a2a" stroke-width="1" rx="6"/>

  <!-- Column labels -->
  <text x="78" y="36" text-anchor="middle" fill="#22c55e" font-family="system-ui,sans-serif" font-size="10" font-weight="600" letter-spacing="0.08em">Authority</text>
  <text x="233" y="36" text-anchor="middle" fill="#22c55e" font-family="system-ui,sans-serif" font-size="10" font-weight="600" letter-spacing="0.08em">Intake</text>
  <text x="387" y="36" text-anchor="middle" fill="#22c55e" font-family="system-ui,sans-serif" font-size="10" font-weight="600" letter-spacing="0.08em">Work Queue</text>
  <text x="680" y="36" text-anchor="middle" fill="#22c55e" font-family="system-ui,sans-serif" font-size="10" font-weight="600" letter-spacing="0.08em">SDLC Pipeline</text>
  <text x="930" y="36" text-anchor="middle" fill="#22c55e" font-family="system-ui,sans-serif" font-size="10" font-weight="600" letter-spacing="0.08em">Delivery</text>

  <!-- Director -->
  <rect x="24" y="218" width="108" height="52" rx="4" fill="url(#flow-boxGrad)" stroke="#666"/>
  <text x="78" y="242" text-anchor="middle" fill="#f0f0f0" font-family="system-ui,sans-serif" font-size="11" font-weight="600">Director</text>
  <text x="78" y="258" text-anchor="middle" fill="#d97706" font-family="system-ui,sans-serif" font-size="9">Human authority</text>

  <!-- Intake group -->
  <rect x="156" y="154" width="154" height="180" rx="8" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6 4"/>
  <rect x="170" y="168" width="126" height="40" rx="4" fill="#1a1a1a" stroke="#666"/>
  <text x="233" y="192" text-anchor="middle" fill="#f0f0f0" font-family="system-ui,sans-serif" font-size="10" font-weight="600">GH Issue</text>
  <rect x="170" y="224" width="126" height="40" rx="4" fill="#1a1a1a" stroke="#666"/>
  <text x="233" y="248" text-anchor="middle" fill="#f0f0f0" font-family="system-ui,sans-serif" font-size="10" font-weight="600">REST API</text>
  <rect x="170" y="280" width="126" height="40" rx="4" fill="#1a1a1a" stroke="#666"/>
  <text x="233" y="304" text-anchor="middle" fill="#f0f0f0" font-family="system-ui,sans-serif" font-size="10" font-weight="600">WhatsApp</text>

  <!-- Work queue -->
  <rect x="322" y="218" width="130" height="52" rx="4" fill="url(#flow-boxGrad)" stroke="#666"/>
  <text x="387" y="242" text-anchor="middle" fill="#f0f0f0" font-family="system-ui,sans-serif" font-size="11" font-weight="600">GH Issues</text>
  <text x="387" y="258" text-anchor="middle" fill="#d97706" font-family="system-ui,sans-serif" font-size="9">Source of truth</text>

  <!-- Phase 1 and 2 -->
  <rect x="480" y="95" width="112" height="46" rx="4" fill="#1a1a1a" stroke="#666"/>
  <text x="536" y="115" text-anchor="middle" fill="#e5e5e5" font-family="system-ui,sans-serif" font-size="9" font-weight="600">PHASE 1</text>
  <text x="536" y="130" text-anchor="middle" fill="#d97706" font-family="system-ui,sans-serif" font-size="10">Business Owner</text>

  <rect x="626" y="95" width="112" height="46" rx="4" fill="#1a1a1a" stroke="#666"/>
  <text x="682" y="115" text-anchor="middle" fill="#e5e5e5" font-family="system-ui,sans-serif" font-size="9" font-weight="600">PHASE 2</text>
  <text x="682" y="130" text-anchor="middle" fill="#d97706" font-family="system-ui,sans-serif" font-size="10">Architect</text>

  <!-- Agent team group -->
  <rect x="518" y="157" width="284" height="174" rx="8" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6 4"/>

  <rect x="536" y="171" width="108" height="38" rx="4" fill="#1a1a1a" stroke="#666"/>
  <text x="590" y="194" text-anchor="middle" fill="#e5e5e5" font-family="system-ui,sans-serif" font-size="10">Tech Writer</text>

  <rect x="536" y="225" width="108" height="38" rx="4" fill="#1a1a1a" stroke="#666"/>
  <text x="590" y="248" text-anchor="middle" fill="#e5e5e5" font-family="system-ui,sans-serif" font-size="10">DevOps</text>

  <rect x="536" y="279" width="108" height="38" rx="4" fill="#1a1a1a" stroke="#666"/>
  <text x="590" y="302" text-anchor="middle" fill="#e5e5e5" font-family="system-ui,sans-serif" font-size="10">Security</text>

  <rect x="676" y="171" width="108" height="38" rx="4" fill="#1a1a1a" stroke="#666"/>
  <text x="730" y="194" text-anchor="middle" fill="#e5e5e5" font-family="system-ui,sans-serif" font-size="10">Developer</text>

  <rect x="676" y="225" width="108" height="38" rx="4" fill="#1a1a1a" stroke="#666"/>
  <text x="730" y="248" text-anchor="middle" fill="#e5e5e5" font-family="system-ui,sans-serif" font-size="10">QA</text>

  <rect x="676" y="279" width="108" height="38" rx="4" fill="#1a1a1a" stroke="#666"/>
  <text x="730" y="302" text-anchor="middle" fill="#e5e5e5" font-family="system-ui,sans-serif" font-size="10">Release Manager</text>

  <!-- Delivery: Phase 3 then target repo -->
  <rect x="870" y="95" width="120" height="46" rx="4" fill="#1a1a1a" stroke="#666"/>
  <text x="930" y="115" text-anchor="middle" fill="#e5e5e5" font-family="system-ui,sans-serif" font-size="9" font-weight="600">PHASE 3</text>
  <text x="930" y="130" text-anchor="middle" fill="#d97706" font-family="system-ui,sans-serif" font-size="10">Release</text>

  <rect x="870" y="278" width="120" height="52" rx="4" fill="url(#flow-boxGrad)" stroke="#777"/>
  <text x="930" y="302" text-anchor="middle" fill="#f0f0f0" font-family="system-ui,sans-serif" font-size="11" font-weight="600">Target Repo</text>
  <text x="930" y="318" text-anchor="middle" fill="#d97706" font-family="system-ui,sans-serif" font-size="9">PR / CI/CD</text>

  <!-- Director to intake (gap between boxes so line is visible) -->
  <path d="M 132 244 L 156 244" fill="none" stroke="#666" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#flow-arrow-intake)"/>

  <!-- Intake to work queue (single merged output) -->
  <path d="M 296 244 L 322 244" fill="none" stroke="#777" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#flow-arrow-intake)"/>

  <!-- Work queue to phase 1 -->
  <path d="M 452 244 L 466 244 L 466 118 L 480 118" fill="none" stroke="#22c55e" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#flow-arrow-sdlc)"/>

  <!-- Phase 1 to phase 2 -->
  <line x1="592" y1="118" x2="626" y2="118" stroke="#22c55e" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#flow-arrow-sdlc)"/>

  <!-- Phase 2 to agent team -->
  <path d="M 682 141 L 682 157" fill="none" stroke="#22c55e" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#flow-arrow-sdlc)"/>

  <!-- Agent team to phase 3 release -->
  <path d="M 802 244 L 835 244 L 835 118 L 870 118" fill="none" stroke="#22c55e" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#flow-arrow-sdlc)"/>

  <!-- Phase 3 to target repo -->
  <path d="M 930 141 L 930 278" fill="none" stroke="#22c55e" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#flow-arrow-sdlc)"/>

  <!-- Approval loop -->
  <path d="M 387 270 L 387 410 L 78 410 L 78 270" fill="none" stroke="#555" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#flow-arrow-intake)"/>
  <text x="232" y="430" text-anchor="middle" fill="#d97706" font-family="system-ui,sans-serif" font-size="9">Approval / status / WhatsApp replies</text>

  <!-- Legend -->
  <rect x="24" y="468" width="12" height="12" rx="2" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="44" y="478" fill="#aaa" font-family="system-ui,sans-serif" font-size="10">Intake &amp; agent teams</text>
  <line x1="190" y1="474" x2="220" y2="474" stroke="#22c55e" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#flow-arrow-sdlc)"/>
  <text x="230" y="478" fill="#aaa" font-family="system-ui,sans-serif" font-size="10">SDLC chain</text>
  <rect x="340" y="466" width="12" height="12" fill="#1a1a1a" stroke="#666"/>
  <text x="360" y="478" fill="#aaa" font-family="system-ui,sans-serif" font-size="10">Autonomous agents</text>
  <line x1="490" y1="474" x2="520" y2="474" stroke="#555" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="530" y="478" fill="#aaa" font-family="system-ui,sans-serif" font-size="10">Director feedback loop</text>
</svg>
