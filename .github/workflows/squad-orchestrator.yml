# Auto-dispatch squad agents when lifecycle labels change (Phase 2a).
# See docs/squad-orchestrator-automation.md
name: Squad orchestrator

permissions:
  issues: write

on:
  issues:
    types: [labeled, opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to orchestrate
        required: true
      lifecycle_label:
        description: Lifecycle label (new, awaiting-approval, director-approved, designed, implemented, validation)
        required: true

concurrency:
  group: squad-orchestrator-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event.issue.state == 'open')
    env:
      GH_TOKEN: ${{ secrets.SQUAD_ORCHESTRATOR_TOKEN || secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}
      LABEL: ${{ github.event.label.name || inputs.lifecycle_label }}
      WHATSAPP_ACCESS_TOKEN: ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
      WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
      WHATSAPP_DIRECTOR_PHONE: ${{ vars.WHATSAPP_DIRECTOR_PHONE }}
      GITHUB_OWNER: ${{ github.repository_owner }}
      SQUAD_WORK_QUEUE_REPO: ${{ github.event.repository.name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve lifecycle label
        id: label
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.lifecycle_label }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "issues" ] && [ "${{ github.event.action }}" = "opened" ]; then
            if gh issue view "$ISSUE_NUMBER" --repo "$REPO" --json labels -q \
              '.labels[].name' | grep -qx 'new'; then
              echo "name=new" >> "$GITHUB_OUTPUT"
            else
              echo "name=" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "name=${LABEL}" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Director (lifecycle step)
        if: >-
          contains(fromJSON('["new","awaiting-approval","director-approved","designed","implemented","validation","release-candidate","released","blocked"]'), steps.label.outputs.name)
        run: |
          STEP="${{ steps.label.outputs.name }}"
          EXTRA=""
          if [ "$STEP" = "awaiting-approval" ]; then
            EXTRA="Summary: Business Analysis ready for your review."
          fi
          chmod +x ./scripts/notify-director-lifecycle.sh
          if ! ./scripts/notify-director-lifecycle.sh "$STEP" "$ISSUE_NUMBER" "$REPO" "$EXTRA"; then
            BODY="$(python3 ./scripts/format-squad-comment.py notice \
              --message "**Squad orchestrator:** WhatsApp notify failed for \`$STEP\` — check WHATSAPP_* secrets/vars." \
              --repo "$REPO")"
            gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body "$BODY" || true
          fi

      - name: Verify director-approved sender
        id: director_ok
        if: steps.label.outputs.name == 'director-approved'
        env:
          SQUAD_DIRECTOR_LOGIN: ${{ vars.SQUAD_DIRECTOR_LOGIN }}
          SQUAD_WHATSAPP_APPROVAL_LOGIN: ${{ vars.SQUAD_WHATSAPP_APPROVAL_LOGIN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "$SQUAD_DIRECTOR_LOGIN" ]; then
            echo "::error::Set repository variable SQUAD_DIRECTOR_LOGIN"
            exit 1
          fi
          chmod +x ./scripts/director-gate-is-authorized.sh
          if ./scripts/director-gate-is-authorized.sh "${{ github.event.sender.login }}"; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            BODY="$(python3 ./scripts/format-squad-comment.py notice \
              --message "**Squad orchestrator:** skipped dispatch — \`director-approved\` was not set by the Director." \
              --repo "$REPO")"
            gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body "$BODY"
          fi

      - name: Dispatch Copilot agent
        id: dispatch
        if: >-
          steps.label.outputs.name == 'new' ||
          steps.label.outputs.name == 'designed' ||
          steps.label.outputs.name == 'implemented' ||
          steps.label.outputs.name == 'validation' ||
          (steps.label.outputs.name == 'director-approved' && steps.director_ok.outputs.ok == 'true')
        run: |
          chmod +x ./scripts/squad-dispatch-copilot.sh \
            ./scripts/squad-dispatch-validation.sh \
            ./scripts/squad-dispatch-subissue.sh \
            ./scripts/squad-find-subissues.py \
            ./scripts/squad-advance-validation.sh \
            ./scripts/squad-advance-implemented.sh
          ./scripts/squad-dispatch-copilot.sh "$REPO" "$ISSUE_NUMBER" "${{ steps.label.outputs.name }}"

      - name: Notify Director (agent dispatched)
        if: steps.dispatch.outputs.dispatched == 'true'
        run: |
          chmod +x ./scripts/notify-director-lifecycle.sh
          ./scripts/notify-director-lifecycle.sh "dispatched-${{ steps.dispatch.outputs.agent }}" "$ISSUE_NUMBER" "$REPO" || true
