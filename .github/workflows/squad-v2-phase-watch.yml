# Squad v2 phase watch — sequential dispatch and label sync. Requires SQUAD_V2=1.
name: Squad v2 phase watch

permissions:
  issues: write
  pull-requests: write
  actions: write

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number (optional)
        required: false
  issue_comment:
    types: [created]

concurrency:
  # Do NOT cancel in-progress: a tick can run an HF agent inline (QA, or a BO/dev
  # rework), and cancelling mid-run orphans the in_progress marker so the issue
  # looks "active" forever. Queue ticks per issue instead.
  group: squad-v2-watch-${{ github.event.issue.number || 'scan' }}
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: vars.SQUAD_V2 == '1'
    env:
      GH_TOKEN: ${{ secrets.SQUAD_ORCHESTRATOR_TOKEN || secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      SQUAD_V2: "1"
      # HF agents (QA, and BO/dev rework) can be dispatched from the tick and run
      # inline here, so HF credentials/provider must be present — without HF_TOKEN
      # the QA dispatch fails ("HF_TOKEN is required").
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      SQUAD_AI_PROVIDER: huggingface
      SQUAD_CODE_RUNTIME: actions
      SQUAD_HF_DEFAULT_MODEL: ${{ vars.SQUAD_HF_DEFAULT_MODEL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Skip squad-internal comments
        if: github.event_name == 'issue_comment'
        id: comment_gate
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          python3 -c "
          import os, sys
          from ai_alpha_squad.squad_v2 import is_squad_internal_comment
          body = os.environ.get('COMMENT_BODY', '')
          sys.exit(0 if is_squad_internal_comment(body) else 1)
          " && echo "run=false" >> "$GITHUB_OUTPUT" || echo "run=true" >> "$GITHUB_OUTPUT"

      - name: Run v2 tick
        if: github.event_name != 'issue_comment' || steps.comment_gate.outputs.run == 'true'
        run: |
          chmod +x ./scripts/squad-v2-tick.sh ./scripts/squad-v2-dispatch.sh \
            ./scripts/squad-sync-planning-labels.sh
          ISSUE="${{ github.event.issue.number || inputs.issue_number }}"
          if [ -n "$ISSUE" ]; then
            ./scripts/squad-v2-tick.sh "$REPO" "$ISSUE"
          else
            ./scripts/squad-v2-tick.sh "$REPO"
          fi
        env:
          PYTHONPATH: ${{ github.workspace }}/src
