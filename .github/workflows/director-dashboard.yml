# Refresh the Director dashboard data: regenerate jobs.json and publish it to the
# director-jobs-json branch, which the deployed Worker reads live (/api/director/jobs).
name: Director dashboard

permissions:
  contents: write
  issues: read

on:
  issues:
    types: [labeled, opened, closed, reopened]
  # v2 runs the whole Developer⇄QA loop under one `director-approved` label, so
  # progress shows up as comments (deliverables, QA reports). Refresh on those
  # too — the concurrency group below coalesces bursts to the latest run.
  issue_comment:
    types: [created]
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"
  workflow_run:
    workflows:
      - Squad orchestrator
      - Squad phase watch
      - Squad v2 orchestrator
      - Squad v2 phase watch
    types: [completed]

# Only one refresh at a time; a newer trigger cancels an in-flight one so the
# LATEST data always wins the force-push (no stale run clobbering a fresh one).
concurrency:
  group: director-dashboard
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.repository == 'eduardocerqueira/ai-alpha-squad'
    env:
      GH_TOKEN: ${{ secrets.SQUAD_ORCHESTRATOR_TOKEN || secrets.GITHUB_TOKEN }}
      # The builder picks the v2 model (BO → Developer → QA, no sub-issues) from this.
      SQUAD_V2: ${{ vars.SQUAD_V2 }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e . 2>/dev/null || true

      - name: Build dashboard JSON
        env:
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          chmod +x ./scripts/squad-director-dashboard.py
          ./scripts/squad-director-dashboard.py --write site/public/director/jobs.json

      - name: Upload snapshot
        uses: actions/upload-artifact@v4
        with:
          name: director-jobs-json
          path: site/public/director/jobs.json
          retention-days: 7

      # main is branch-protected (PR + ci-test). Push to a data branch; do not fail the job on push errors.
      - name: Publish JSON to director-jobs-json branch
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B director-jobs-json
          git add site/public/director/jobs.json
          if git diff --staged --quiet; then
            echo "No dashboard changes"
            exit 0
          fi
          git commit -m "chore(director): refresh dashboard jobs.json"
          if git push -f origin director-jobs-json; then
            echo "Pushed to director-jobs-json branch"
          else
            echo "::warning::Could not push dashboard JSON (branch protection or permissions). Artifact uploaded; use ./scripts/squad-director-now.sh locally."
          fi

      # Reconciler: push the snapshot to KV (in case a webhook was missed) and
      # refresh every open dashboard. The webhook is the real-time path; this is
      # the 15-min safety net.
      - name: Ingest snapshot + notify dashboards
        continue-on-error: true
        env:
          NOTIFY_SECRET: ${{ secrets.DASHBOARD_NOTIFY_SECRET }}
        run: |
          if [ -z "$NOTIFY_SECRET" ]; then
            echo "DASHBOARD_NOTIFY_SECRET not set — skipping"; exit 0
          fi
          code=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $NOTIFY_SECRET" \
            -H "Content-Type: application/json" \
            --data-binary @site/public/director/jobs.json \
            https://aialphasquad.com/api/director/ingest)
          echo "ingest -> HTTP $code"
